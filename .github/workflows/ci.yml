name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Services Postgres + Redis pour les tests d'integration.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: accelyo_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    # Variables partagees par les etapes migrate + tests.
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/accelyo_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      JWT_REFRESH_SECRET: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
      ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      API_BASE_URL: http://localhost:3000
      DASHBOARD_URL: http://localhost:5173
      MINIO_USER: test
      MINIO_PASSWORD: test
      RSA_PRIVATE_KEY_PATH: /tmp/rsa_private.pem
      RSA_PUBLIC_KEY_PATH: /tmp/rsa_public.pem

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Cles RSA ephemeres pour la signature des cartes (jamais commitees).
      - name: Generate RSA test keys
        run: |
          openssl genrsa -out "$RSA_PRIVATE_KEY_PATH" 2048
          openssl rsa -in "$RSA_PRIVATE_KEY_PATH" -pubout -out "$RSA_PUBLIC_KEY_PATH"

      - name: Typecheck
        run: npm run typecheck

      # Build le bundle de prod de l'API (esbuild inline les packages @accelyo
      # depuis la source - pas de tsc cross-package fragile).
      - name: Build API (bundle ESM)
        run: npm run build --workspace @accelyo/api

      # Applique le schema sur la base de test AVANT les tests d'integration.
      - name: Apply migrations (test DB)
        run: npm run prisma:migrate --workspace @accelyo/api

      - name: Tests + couverture
        run: npm run test:coverage

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (informatif)
        run: npm audit --audit-level=high || true

      # NOTE: CodeQL est mieux active via Settings > Security > Code scanning
      # ("Default setup"), qui ne necessite pas de workflow dedie ni de droits
      # particuliers. On l'a retire d'ici pour eviter un echec de CI.
