name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: accelyo_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Tests + couverture (minimum 80%)
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/accelyo_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          JWT_REFRESH_SECRET: fedcba9876543210fedcba9876543210fedcba9876543210fedcba9876543210
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          API_BASE_URL: http://localhost:3000
          DASHBOARD_URL: http://localhost:5173
          MINIO_USER: test
          MINIO_PASSWORD: test
          RSA_PRIVATE_KEY_PATH: /tmp/key.pem
          RSA_PUBLIC_KEY_PATH: /tmp/key.pub.pem

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit dependencies
        run: npm audit --audit-level=high || true
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      - name: CodeQL analysis
        uses: github/codeql-action/analyze@v3
