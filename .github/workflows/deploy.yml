name: Deploy production

# Declenche sur un tag de version (v1.2.3) ou manuellement.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------
  # Build + push des images Docker vers GitHub Container Registry.
  # Aucun secret externe requis: on s'authentifie avec le GITHUB_TOKEN
  # integre. Images publiees sous ghcr.io/<owner>/accelyo-*.
  # -----------------------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata (tags) pour l'API
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-api
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata (tags) pour le Dashboard
        id: meta_dash
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-dashboard
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build & push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta_dash.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------
  # Deploiement SSH vers le serveur de production - OPTIONNEL.
  # Ne s'execute que si la variable de repo PROD_DEPLOY_ENABLED == 'true'
  # (Settings > Secrets and variables > Actions > Variables), et requiert
  # les secrets PROD_HOST / PROD_USER / PROD_SSH_KEY.
  # -----------------------------------------------------------------
  deploy-server:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: ${{ vars.PROD_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: Trigger remote deployment (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/accelyo
            ./infra/scripts/deploy.sh
