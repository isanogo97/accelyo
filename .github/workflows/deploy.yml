name: Deploy production

# Le deploiement ne se declenche QUE sur un tag de version (v1.2.3) ou
# manuellement. Evite un echec a chaque push tant que les secrets de
# registry/SSH ne sont pas configures dans les Settings du repo.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/accelyo/api:latest
            ${{ secrets.REGISTRY_URL }}/accelyo/api:${{ github.sha }}

      - name: Build & push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/dashboard/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/accelyo/dashboard:latest
            ${{ secrets.REGISTRY_URL }}/accelyo/dashboard:${{ github.sha }}

      - name: Trigger remote deployment
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/accelyo
            ./infra/scripts/deploy.sh
