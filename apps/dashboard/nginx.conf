# Config nginx pour le SPA dashboard.
# Toutes les routes inconnues -> index.html (SPA routing cote client).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Cache long pour les assets immutables (hash dans le nom).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Pas de cache sur l'index.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    # Securite minimale supplementaire (le proxy front aura ses propres headers).
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
