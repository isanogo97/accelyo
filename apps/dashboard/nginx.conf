# Config nginx pour le SPA dashboard (servi en interne dans l'image).
# Proxifie /api vers le service API (meme origine -> pas de CORS cote web).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # Appels API du dashboard -> conteneur "api" du compose.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache long pour les assets immutables (hash dans le nom).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA: toute route inconnue -> index.html (routing client).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store";
    }

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
}
