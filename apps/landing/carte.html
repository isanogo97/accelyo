<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"/>
<meta name="theme-color" content="#0f172a"/>
<meta name="robots" content="noindex"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Accelyo"/>
<title>Mon espace etudiant - Accelyo</title>
<link rel="icon" href="/assets/logo.svg"/>
<link rel="apple-touch-icon" href="/assets/logo.svg"/>
<link rel="manifest" href="/manifest.webmanifest"/>
<link rel="stylesheet" href="/assets/app.css"/>
</head>
<body>
<div class="app-frame" id="app">

  <!-- ============ AUTH (login) ============ -->
  <section class="auth-screen hidden" id="loginScreen">
    <div class="auth-wrap">
      <div class="auth-brand">
        <img src="/assets/logo.svg" alt="Accelyo"/>
        <span class="name">Accelyo</span>
      </div>
      <div class="auth-card">
        <h1>Mon espace</h1>
        <p class="sub">Connectez-vous pour acceder a votre carte.</p>
        <div class="alert err hidden" id="lErr" role="alert"></div>
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="lEmail">E-mail</label>
            <input id="lEmail" type="email" autocomplete="email" required/>
          </div>
          <div class="field">
            <label for="lPw">Mot de passe</label>
            <input id="lPw" type="password" autocomplete="current-password" required/>
          </div>
          <button class="btn primary" type="submit" id="lBtn">Se connecter</button>
        </form>
      </div>
    </div>
  </section>

  <!-- ============ AUTH (activation) ============ -->
  <section class="auth-screen hidden" id="activateScreen">
    <div class="auth-wrap">
      <div class="auth-brand">
        <img src="/assets/logo.svg" alt="Accelyo"/>
        <span class="name">Accelyo</span>
      </div>
      <div class="auth-card">
        <h1>Activez votre carte</h1>
        <p class="sub">Choisissez un mot de passe pour activer votre carte.</p>
        <div class="alert err hidden" id="aErr" role="alert"></div>
        <form id="activateForm" novalidate>
          <div class="field">
            <label for="pw">Mot de passe</label>
            <input id="pw" type="password" autocomplete="new-password" required/>
          </div>
          <p class="hint-pw">Au moins 12 caracteres, avec une majuscule, une minuscule, un chiffre et un caractere special.</p>
          <div class="field">
            <label for="pw2">Confirmer le mot de passe</label>
            <input id="pw2" type="password" autocomplete="new-password" required/>
          </div>
          <button class="btn primary" type="submit" id="aBtn">Activer ma carte</button>
        </form>
      </div>
    </div>
  </section>

  <!-- ============ APP SHELL ============ -->
  <div class="app-shell hidden" id="appShell">
    <header class="app-header">
      <img id="hLogo" src="/assets/logo.svg" alt=""/>
      <div class="estab">
        <span id="hName">Accelyo</span>
        <small id="hSector"></small>
      </div>
    </header>

    <main class="app-main" id="main" tabindex="-1"></main>

    <nav class="tabbar" id="tabbar" aria-label="Navigation principale"></nav>
  </div>

  <div class="toast-wrap" id="toasts" aria-live="polite"></div>
</div>

<script>
/* ============================================================
   Accelyo — App etudiante PWA (same-origin, zero ressource externe)
   Le token JWT reste EN MEMOIRE (jwt). sessionStorage seulement
   pour survivre a un reload d'onglet. Aucune PII persistee.
   ============================================================ */
(function () {
  'use strict';
  var API = '/api/v1';
  var SS_KEY = 'accelyo_jwt';          // sessionStorage uniquement (token, pas de PII)
  var LS_TAB = 'accelyo_last_tab';     // preference non sensible

  // ----- Etat en memoire -----
  var jwt = null;
  try { jwt = sessionStorage.getItem(SS_KEY) || null; } catch (e) { jwt = null; }
  var me = null;                       // profil charge (memoire seulement)
  var cache = {};                      // donnees d'onglets (memoire, lazy)
  var currentTab = null;

  // ----- Helpers DOM -----
  function $(id) { return document.getElementById(id); }
  function el(tag, cls, txt) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (txt != null) e.textContent = txt;
    return e;
  }
  function esc(s) { return (s == null ? '' : String(s)); }

  function showScreen(which) {
    $('loginScreen').classList.toggle('hidden', which !== 'login');
    $('activateScreen').classList.toggle('hidden', which !== 'activate');
    $('appShell').classList.toggle('hidden', which !== 'app');
  }

  // ----- Toasts -----
  function toast(msg, kind) {
    var t = el('div', 'toast' + (kind ? ' ' + kind : ''), msg);
    $('toasts').appendChild(t);
    setTimeout(function () {
      t.classList.add('out');
      setTimeout(function () { if (t.parentNode) t.parentNode.removeChild(t); }, 260);
    }, 2600);
  }

  // ----- API fetch (enveloppe {success,data}) -----
  function api(path, opts) {
    opts = opts || {};
    var headers = opts.headers || {};
    if (jwt) headers['Authorization'] = 'Bearer ' + jwt;
    return fetch(API + path, {
      method: opts.method || 'GET',
      headers: headers,
      body: opts.body
    }).then(function (r) {
      return r.json().then(function (d) { return { ok: r.ok, status: r.status, data: d }; },
        function () { return { ok: r.ok, status: r.status, data: null }; });
    });
  }
  function apiJson(path, method, payload) {
    return api(path, {
      method: method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  }
  function errMsg(res, fallback) {
    if (res && res.data && res.data.error && res.data.error.message) return res.data.error.message;
    return fallback;
  }

  // ----- Date helpers (FR) -----
  var DAYS = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
  var MONTHS = ['janv.', 'fevr.', 'mars', 'avr.', 'mai', 'juin', 'juil.', 'aout', 'sept.', 'oct.', 'nov.', 'dec.'];
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function hm(d) { return pad(d.getHours()) + ':' + pad(d.getMinutes()); }
  function dayKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
  function fmtDateLong(d) { return d.getDate() + ' ' + MONTHS[d.getMonth()] + ' ' + d.getFullYear(); }
  function dayLabel(d) {
    var now = new Date();
    var k0 = dayKey(now);
    var tom = new Date(now.getTime() + 86400000);
    if (dayKey(d) === k0) return "Aujourd'hui";
    if (dayKey(d) === dayKey(tom)) return 'Demain';
    return DAYS[d.getDay()] + ' ' + d.getDate() + ' ' + MONTHS[d.getMonth()];
  }
  function relDate(iso) {
    var d = new Date(iso), now = new Date();
    var diff = Math.round((now - d) / 1000);
    if (diff < 60) return "a l'instant";
    if (diff < 3600) return 'il y a ' + Math.floor(diff / 60) + ' min';
    if (diff < 86400) return 'il y a ' + Math.floor(diff / 3600) + ' h';
    var days = Math.floor(diff / 86400);
    if (days < 7) return 'il y a ' + days + ' j';
    return fmtDateLong(d);
  }

  // ----- Icones SVG inline -----
  function svg(name) {
    var P = {
      card: '<rect x="2" y="5" width="20" height="14" rx="3"/><path d="M2 10h20" stroke-width="0" fill="currentColor"/><rect x="2" y="9.5" width="20" height="2.4"/>',
      cardOutline: '<rect x="2.5" y="5" width="19" height="14" rx="3" fill="none" stroke="currentColor" stroke-width="2"/><path d="M2.5 10h19" stroke="currentColor" stroke-width="2"/><rect x="6" y="14.5" width="6" height="2" rx="1" fill="currentColor"/>',
      cal: '<rect x="3" y="5" width="18" height="16" rx="2.5" fill="none" stroke="currentColor" stroke-width="2"/><path d="M3 9h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      bell: '<path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M13.7 21a2 2 0 0 1-3.4 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      book: '<path d="M4 5a2 2 0 0 1 2-2h12v16H6a2 2 0 0 0-2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M4 19a2 2 0 0 0 2 2h12" fill="none" stroke="currentColor" stroke-width="2"/>',
      tag: '<path d="M3 7v5.2a2 2 0 0 0 .6 1.4l7.8 7.8a2 2 0 0 0 2.8 0l5.4-5.4a2 2 0 0 0 0-2.8L11.8 5.4A2 2 0 0 0 10.4 5H5a2 2 0 0 0-2 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="7.5" cy="9.5" r="1.6" fill="currentColor"/>',
      user: '<circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 21c0-4 3.5-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      clock: '<circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v5l3.5 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      pin: '<path d="M9 4h6l-1 6 3 3v2H7v-2l3-3z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M12 15v5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>',
      loc: '<path d="M12 22s7-6.2 7-12a7 7 0 1 0-14 0c0 5.8 7 12 7 12z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="10" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>',
      copy: '<rect x="9" y="9" width="11" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10" fill="none" stroke="currentColor" stroke-width="2"/>',
      ext: '<path d="M14 4h6v6M20 4l-9 9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'
    };
    return '<svg viewBox="0 0 24 24" aria-hidden="true">' + (P[name] || '') + '</svg>';
  }

  // ====================================================================
  // AUTH
  // ====================================================================
  function setErr(id, msg) { var e = $(id); e.textContent = msg; e.classList.remove('hidden'); }
  function clrErr(id) { $(id).classList.add('hidden'); }

  function bootAuth() {
    var params = new URLSearchParams(location.search);
    var actToken = params.get('token');
    if (actToken) {
      showScreen('activate');
      $('activateForm').onsubmit = function (e) {
        e.preventDefault();
        clrErr('aErr');
        var pw = $('pw').value, pw2 = $('pw2').value;
        var pwOk = pw.length >= 12 && /[a-z]/.test(pw) && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw);
        if (!pwOk) { setErr('aErr', 'Le mot de passe doit faire au moins 12 caracteres et contenir une majuscule, une minuscule, un chiffre et un caractere special.'); return; }
        if (pw !== pw2) { setErr('aErr', 'Les mots de passe ne correspondent pas.'); return; }
        var b = $('aBtn'); b.disabled = true; b.textContent = 'Activation...';
        apiJson('/student-auth/activate', 'POST', { token: actToken, password: pw })
          .then(function (res) {
            if (!res.ok || !res.data || !res.data.data) throw new Error(errMsg(res, "Echec de l'activation."));
            setToken(res.data.data.token);
            return enterApp();
          })
          .catch(function (err) {
            setErr('aErr', err.message);
            b.disabled = false; b.textContent = 'Activer ma carte';
          });
      };
    } else {
      showScreen('login');
      $('loginForm').onsubmit = function (e) {
        e.preventDefault();
        clrErr('lErr');
        var email = $('lEmail').value.trim(), pw = $('lPw').value;
        if (!email || !pw) { setErr('lErr', 'Renseignez votre e-mail et votre mot de passe.'); return; }
        var b = $('lBtn'); b.disabled = true; b.textContent = 'Connexion...';
        apiJson('/student-auth/login', 'POST', { email: email, password: pw })
          .then(function (res) {
            if (!res.ok || !res.data || !res.data.data) throw new Error(errMsg(res, 'Identifiants invalides.'));
            setToken(res.data.data.token);
            return enterApp();
          })
          .catch(function (err) {
            setErr('lErr', err.message);
            b.disabled = false; b.textContent = 'Se connecter';
          });
      };
    }
  }

  function setToken(t) {
    jwt = t;
    try { sessionStorage.setItem(SS_KEY, t); } catch (e) { /* memoire suffit */ }
  }
  function clearToken() {
    jwt = null; me = null; cache = {};
    try { sessionStorage.removeItem(SS_KEY); } catch (e) {}
  }

  // ====================================================================
  // ENTREE DANS L'APP : charge /me, applique branding, monte la nav
  // ====================================================================
  function enterApp() {
    return api('/student-auth/me').then(function (res) {
      if (res.status === 401 || res.status === 403) { clearToken(); showScreen('login'); return; }
      if (!res.ok || !res.data || !res.data.data) throw new Error(errMsg(res, 'Session expiree.'));
      me = res.data.data;
      applyBranding();
      buildTabs();
      showScreen('app');
      // restaure le dernier onglet (preference non sensible)
      var last = null;
      try { last = localStorage.getItem(LS_TAB); } catch (e) {}
      var tabs = visibleTabs();
      var start = (last && tabs.indexOf(last) !== -1) ? last : 'carte';
      selectTab(start);
    });
  }

  function applyBranding() {
    var est = me.establishment || {};
    var brand = est.brandColor || '#2563eb';
    document.documentElement.style.setProperty('--brand', brand);
    document.documentElement.style.setProperty('--brand-2', shade(brand, -0.16));
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0f172a');
    $('hName').textContent = est.name || 'Accelyo';
    $('hSector').textContent = sectorLabel(est.sector);
    if (est.logoUrl) { $('hLogo').src = est.logoUrl; $('hLogo').onerror = function () { this.src = '/assets/logo.svg'; }; }
  }
  function sectorLabel(s) {
    return ({ SCHOOL: 'Etablissement scolaire', LIBRARY: 'Bibliotheque', COMPANY: 'Entreprise', ASSOCIATION: 'Association' })[s] || '';
  }
  function cardTitleFor(s) {
    if (s === 'COMPANY') return 'Carte';
    if (s === 'ASSOCIATION') return 'Carte membre';
    return 'Carte etudiante';
  }
  // assombrit une couleur hex
  function shade(hex, amt) {
    var m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    if (!m) return hex;
    var r = parseInt(m[1], 16), g = parseInt(m[2], 16), b = parseInt(m[3], 16);
    function adj(c) { return Math.max(0, Math.min(255, Math.round(c + c * amt))); }
    function hx(c) { var s = adj(c).toString(16); return s.length < 2 ? '0' + s : s; }
    return '#' + hx(r) + hx(g) + hx(b);
  }

  // ====================================================================
  // NAVIGATION PAR ONGLETS
  // ====================================================================
  var TAB_DEFS = [
    { id: 'carte', label: 'Carte', icon: 'cardOutline' },
    { id: 'planning', label: 'Planning', icon: 'cal' },
    { id: 'infos', label: 'Infos', icon: 'bell' },
    { id: 'biblio', label: 'Biblio', icon: 'book', librariesOnly: true },
    { id: 'deals', label: 'Bons plans', icon: 'tag' },
    { id: 'profil', label: 'Profil', icon: 'user' }
  ];
  function visibleTabs() {
    var lib = me && me.establishment && me.establishment.sector === 'LIBRARY';
    return TAB_DEFS.filter(function (t) { return !t.librariesOnly || lib; }).map(function (t) { return t.id; });
  }
  function buildTabs() {
    var bar = $('tabbar'); bar.innerHTML = '';
    var vis = visibleTabs();
    TAB_DEFS.forEach(function (t) {
      if (vis.indexOf(t.id) === -1) return;
      var b = el('button');
      b.type = 'button';
      b.setAttribute('aria-label', t.label);
      b.setAttribute('data-tab', t.id);
      b.innerHTML = svg(t.icon) + '<span>' + t.label + '</span>';
      b.onclick = function () { selectTab(t.id); };
      bar.appendChild(b);
    });
  }
  function selectTab(id) {
    currentTab = id;
    try { localStorage.setItem(LS_TAB, id); } catch (e) {}
    var btns = $('tabbar').querySelectorAll('button');
    for (var i = 0; i < btns.length; i++) {
      var on = btns[i].getAttribute('data-tab') === id;
      btns[i].classList.toggle('active', on);
      btns[i].setAttribute('aria-current', on ? 'page' : 'false');
    }
    renderTab(id);
    $('main').scrollTop = 0;
  }

  function renderTab(id) {
    var main = $('main');
    main.innerHTML = '';
    var view = el('div', 'view');
    main.appendChild(view);
    switch (id) {
      case 'carte': return renderCarte(view);
      case 'planning': return renderLazy(view, 'planning', loadSchedule, renderSchedule, 'Planning', 'Vos prochains cours.');
      case 'infos': return renderLazy(view, 'infos', loadNews, renderNews, 'Infos', 'Les annonces de votre etablissement.');
      case 'biblio': return renderLazy(view, 'biblio', loadLoans, renderLoans, 'Bibliotheque', 'Vos emprunts en cours.');
      case 'deals': return renderLazy(view, 'deals', loadDeals, renderDeals, 'Bons plans', 'Offres reservees aux etudiants.');
      case 'profil': return renderProfile(view);
    }
  }

  // helper de chargement paresseux generique
  function loadingBlock() {
    var w = el('div', 'loading');
    w.innerHTML = '<div class="spinner"></div><div>Chargement...</div>';
    return w;
  }
  function emptyBlock(icon, title, desc) {
    var e = el('div', 'empty');
    e.innerHTML = '<div class="ico">' + svg(icon) + '</div><div class="t">' + esc(title) + '</div><div class="d">' + esc(desc) + '</div>';
    return e;
  }
  function header(view, title, sub) {
    view.appendChild(el('h2', 'view-title', title));
    if (sub) view.appendChild(el('p', 'view-sub', sub));
  }

  // Pour planning/infos/biblio/deals : lazy + cache memoire
  function renderLazy(view, key, loader, renderer, title, sub) {
    header(view, title, sub);
    var slot = el('div');
    view.appendChild(slot);
    if (cache[key]) { renderer(slot, cache[key]); return; }
    slot.appendChild(loadingBlock());
    loader().then(function (data) {
      cache[key] = data;
      slot.innerHTML = '';
      renderer(slot, data);
    }).catch(function () {
      slot.innerHTML = '';
      slot.appendChild(emptyBlock('bell', 'Indisponible', 'Impossible de charger ces donnees. Reessayez plus tard.'));
    });
  }

  // ====================================================================
  // ONGLET CARTE
  // ====================================================================
  // Initiales prenom + nom pour l'avatar de repli (aucune ressource externe)
  function initialsOf(st) {
    var f = (st.firstName || '').trim();
    var l = (st.lastName || '').trim();
    var a = f ? f.charAt(0) : '';
    var b = l ? l.charAt(0) : '';
    var ini = (a + b).toUpperCase();
    return ini || '—';
  }

  function renderCarte(view) {
    var st = me.student || {}, est = me.establishment || {}, card = me.card || null;
    var sector = est.sector;
    header(view, cardTitleFor(sector), null);

    var status = card ? card.status : null;
    var active = status === 'ACTIVE' || status === 'Active';
    var suspended = status === 'SUSPENDED' || status === 'Suspended';
    var statusTxt = !card ? '—' : (active ? 'Active' : (suspended ? 'Suspendue' : status));
    var statusCls = !card ? 'none' : (active ? 'active' : (suspended ? 'suspended' : 'other'));
    var name = ((st.firstName || '') + ' ' + (st.lastName || '')).trim() || '—';
    var exp = (card && card.expiresAt) ? fmtDateLong(new Date(card.expiresAt)) : '';
    var roleTxt = ({ COMPANY: 'Collaborateur', ASSOCIATION: 'Membre' })[sector] || 'Etudiant';
    var subline = roleTxt + (st.program ? ' · ' + st.program : '');

    // Couleur de texte de la carte (defaut blanc) — pilote la lisibilite
    var textColor = est.cardTextColor || '#ffffff';

    var ic = el('div', 'idcard');
    ic.style.setProperty('--card-ink', textColor);

    // Fond : image de l'etablissement (meme origine) sinon degrade de marque
    if (est.cardBackgroundUrl) {
      ic.classList.add('has-bg');
      ic.style.backgroundImage = 'url("' + String(est.cardBackgroundUrl).replace(/"/g, '%22') + '")';
    }

    // Logo etablissement (sinon logo Accelyo en filigrane blanc)
    var hasEstLogo = !!est.logoUrl;
    var logoSrc = hasEstLogo ? esc(est.logoUrl) : '/assets/logo.svg';

    // Vignette photo etudiant (URL presignee same-origin) ou avatar a initiales
    var photoHtml;
    if (st.photoUrl) {
      photoHtml = '<div class="ic-photo"><img alt="Photo de ' + esc(name) + '"/></div>';
    } else {
      photoHtml = '<div class="ic-photo ic-photo-fallback" aria-hidden="true">' + esc(initialsOf(st)) + '</div>';
    }

    ic.innerHTML =
      '<div class="ic-overlay" aria-hidden="true"></div>' +
      '<div class="ic-shine" aria-hidden="true"></div>' +
      '<div class="ic-content">' +
        '<div class="ic-top">' +
          '<div class="ic-brand">' +
            '<span class="ic-logo' + (hasEstLogo ? ' estab' : '') + '"><img src="' + logoSrc + '" alt=""/></span>' +
            '<span class="ic-estab">' + esc(est.name || 'Accelyo') + '</span>' +
          '</div>' +
          '<div class="ic-type">' + esc(cardTitleFor(sector)) + '</div>' +
        '</div>' +
        '<div class="ic-body">' +
          photoHtml +
          '<div class="ic-ident">' +
            '<div class="ic-chip" aria-hidden="true"><span></span></div>' +
            '<div class="ic-name">' + esc(name) + '</div>' +
            '<div class="ic-role">' + esc(subline) + '</div>' +
            '<div class="ic-num">' + esc(st.studentNumber || '') + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="ic-meta">' +
          '<span class="badge ' + statusCls + '"><span class="dot"></span>' + esc(statusTxt) + '</span>' +
          (exp ? '<span class="ic-exp"><small>Expire le</small>' + esc(exp) + '</span>' : '') +
        '</div>' +
      '</div>';

    // Charge la photo en JS (repli avatar si l'URL presignee echoue)
    if (st.photoUrl) {
      var img = ic.querySelector('.ic-photo img');
      if (img) {
        img.onerror = function () {
          var box = ic.querySelector('.ic-photo');
          if (box) {
            box.classList.add('ic-photo-fallback');
            box.setAttribute('aria-hidden', 'true');
            box.innerHTML = esc(initialsOf(st));
          }
        };
        img.src = st.photoUrl;
      }
    }
    view.appendChild(ic);

    // Boutons Wallet
    var wrap = el('div', 'wallet-btns');

    var gw = el('button', 'wbtn');
    gw.type = 'button';
    gw.innerHTML =
      '<svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22 12c0-.7-.1-1.4-.2-2H12v4h5.6a4.8 4.8 0 0 1-2 3.2v2.6h3.3C20.7 18 22 15.3 22 12z"/><path fill="#34A853" d="M12 22c2.7 0 5-1 6.6-2.6l-3.3-2.6c-.9.6-2 .9-3.3.9-2.6 0-4.7-1.7-5.5-4.1H3.1v2.6A10 10 0 0 0 12 22z"/><path fill="#FBBC05" d="M6.5 13.6a6 6 0 0 1 0-3.2V7.8H3.1a10 10 0 0 0 0 8.4z"/><path fill="#EA4335" d="M12 6.4c1.5 0 2.8.5 3.8 1.5l2.9-2.9A10 10 0 0 0 3.1 7.8l3.4 2.6C7.3 8 9.4 6.4 12 6.4z"/></svg>' +
      '<span>Ajouter a Google Wallet</span>';
    gw.onclick = function () { addGoogleWallet(gw); };

    var aw = el('button', 'wbtn apple');
    aw.type = 'button';
    aw.innerHTML =
      '<svg width="17" height="17" viewBox="0 0 24 24" fill="#fff" aria-hidden="true"><path d="M16.4 12.7c0-2.2 1.8-3.3 1.9-3.3-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.6.8-3.3.8-.7 0-1.7-.8-2.8-.8-1.4 0-2.8.8-3.5 2.1-1.5 2.6-.4 6.4 1.1 8.5.7 1 1.5 2.2 2.6 2.1 1-.04 1.4-.7 2.7-.7 1.2 0 1.6.7 2.7.7 1.1 0 1.8-1 2.5-2 .8-1.2 1.1-2.3 1.1-2.4-.02-.01-2.1-.8-2.1-3.2zM14.3 6.3c.6-.7 1-1.7.9-2.7-.8 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6.9.1 1.8-.5 2.5-1.2z"/></svg>' +
      '<span>Ajouter a Apple Wallet</span>';
    aw.onclick = function () { addAppleWallet(aw); };

    wrap.appendChild(gw);
    wrap.appendChild(aw);
    view.appendChild(wrap);

    var note = el('p', 'privacy-note', 'Vos donnees restent privees et hebergees par votre etablissement.');
    view.appendChild(note);
  }

  function addGoogleWallet(btn) {
    var prev = btn.innerHTML; btn.disabled = true;
    api('/student-auth/me/wallet/google').then(function (res) {
      btn.disabled = false;
      var url = res.data && res.data.data && res.data.data.saveUrl;
      if (res.ok && url) { window.open(url, '_blank', 'noopener,noreferrer'); }
      else { toast('Google Wallet indisponible.', 'err'); }
    }).catch(function () { btn.disabled = false; toast('Google Wallet indisponible.', 'err'); });
  }

  function addAppleWallet(btn) {
    btn.disabled = true;
    // requete brute pour gerer le binaire .pkpass vs JSON d'erreur
    fetch(API + '/student-auth/me/wallet/apple', {
      headers: jwt ? { 'Authorization': 'Bearer ' + jwt } : {}
    }).then(function (r) {
      var ct = (r.headers.get('Content-Type') || '').toLowerCase();
      if (r.ok && ct.indexOf('apple.pkpass') !== -1) {
        return r.blob().then(function (blob) {
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url;
          a.download = 'carte-accelyo.pkpass';
          document.body.appendChild(a);
          a.click();
          setTimeout(function () { URL.revokeObjectURL(url); if (a.parentNode) a.parentNode.removeChild(a); }, 1500);
          btn.disabled = false;
        });
      }
      btn.disabled = false;
      toast('Apple Wallet bientot disponible.', 'err');
    }).catch(function () {
      btn.disabled = false;
      toast('Apple Wallet bientot disponible.', 'err');
    });
  }

  // ====================================================================
  // ONGLET PLANNING
  // ====================================================================
  function loadSchedule() {
    var from = new Date();
    var to = new Date(from.getTime() + 14 * 86400000);
    return api('/student-auth/me/schedule?from=' + encodeURIComponent(from.toISOString()) + '&to=' + encodeURIComponent(to.toISOString()))
      .then(function (res) {
        if (!res.ok) throw new Error('fail');
        return (res.data && res.data.data && res.data.data.entries) || [];
      });
  }
  function renderSchedule(slot, entries) {
    if (!entries.length) { slot.appendChild(emptyBlock('cal', 'Aucun cours a venir', 'Votre planning des deux prochaines semaines est vide.')); return; }
    var lastKey = null;
    entries.forEach(function (e) {
      var s = new Date(e.startsAt), en = new Date(e.endsAt);
      var k = dayKey(s);
      if (k !== lastKey) { slot.appendChild(el('div', 'section-day', dayLabel(s))); lastKey = k; }
      var card = el('div', 'row-card sched');
      var meta = [];
      if (e.location) meta.push('<span>' + svg('loc') + esc(e.location) + '</span>');
      if (e.teacher) meta.push('<span>' + svg('user') + esc(e.teacher) + '</span>');
      card.innerHTML =
        '<div class="time"><div class="start">' + hm(s) + '</div><div class="end">' + hm(en) + '</div></div>' +
        '<div class="body"><div class="ttl">' + esc(e.title) + '</div>' +
        (meta.length ? '<div class="meta">' + meta.join('') + '</div>' : '') + '</div>';
      slot.appendChild(card);
    });
  }

  // ====================================================================
  // ONGLET INFOS (news)
  // ====================================================================
  function loadNews() {
    return api('/student-auth/me/news').then(function (res) {
      if (!res.ok) throw new Error('fail');
      return (res.data && res.data.data && res.data.data.items) || [];
    });
  }
  function renderNews(slot, items) {
    if (!items.length) { slot.appendChild(emptyBlock('bell', 'Aucune annonce', "Il n'y a rien de nouveau pour le moment.")); return; }
    // epinglees d'abord
    var sorted = items.slice().sort(function (a, b) {
      if (!!a.isPinned !== !!b.isPinned) return a.isPinned ? -1 : 1;
      return new Date(b.publishedAt) - new Date(a.publishedAt);
    });
    sorted.forEach(function (n) {
      var card = el('div', 'row-card news-item');
      var head = '<div class="news-head">';
      if (n.isPinned) head += '<span class="chip pin">' + svg('pin') + ' Epingle</span>';
      if (n.category) head += '<span class="chip brand">' + esc(n.category) + '</span>';
      head += '<span class="news-date">' + esc(relDate(n.publishedAt)) + '</span></div>';
      card.innerHTML = head +
        '<div class="news-ttl">' + esc(n.title) + '</div>' +
        (n.body ? '<div class="news-body">' + esc(n.body) + '</div>' : '');
      slot.appendChild(card);
    });
  }

  // ====================================================================
  // ONGLET BIBLIO (loans)
  // ====================================================================
  function loadLoans() {
    return api('/student-auth/me/loans').then(function (res) {
      if (!res.ok) throw new Error('fail');
      return (res.data && res.data.data && res.data.data.loans) || [];
    });
  }
  function renderLoans(slot, loans) {
    // n'affiche que les prets non rendus en priorite, mais montre tout
    var active = loans.filter(function (l) { return !l.returnedAt; });
    if (!active.length) { slot.appendChild(emptyBlock('book', 'Aucun emprunt', "Vous n'avez aucun ouvrage emprunte actuellement.")); return; }
    active.forEach(function (l) { slot.appendChild(loanCard(l)); });
  }
  function loanCard(l) {
    var card = el('div', 'row-card loan');
    card.setAttribute('data-loan', l.id);
    var due = l.dueAt ? new Date(l.dueAt) : null;
    var now = new Date();
    var cls = '', icon = svg('clock'), label = '';
    if (due) {
      var ms = due - now;
      var days = Math.ceil(ms / 86400000);
      if (ms < 0) { cls = 'late'; label = 'En retard (depuis le ' + fmtDateLong(due) + ')'; }
      else if (days <= 3) { cls = 'soon'; label = 'A rendre bientot — ' + fmtDateLong(due); }
      else { label = 'A rendre le ' + fmtDateLong(due); }
    }
    var canRenew = !!l.canRenew;
    var renewInfo = '';
    if (typeof l.maxRenewals === 'number') {
      renewInfo = 'Prolongation ' + (l.renewedCount || 0) + '/' + l.maxRenewals;
    }
    card.innerHTML =
      '<div class="loan-ttl">' + esc(l.bookTitle) + '</div>' +
      (l.bookAuthor ? '<div class="loan-author">' + esc(l.bookAuthor) + '</div>' : '') +
      (label ? '<div class="loan-due ' + cls + '">' + icon + esc(label) + '</div>' : '') +
      '<div class="loan-foot">' +
        '<span class="renew-info">' + esc(renewInfo) + '</span>' +
        '<button class="btn-sm" type="button"' + (canRenew ? '' : ' disabled') + '>Prolonger</button>' +
      '</div>';
    var btn = card.querySelector('.btn-sm');
    if (canRenew) {
      btn.onclick = function () { renewLoan(l.id, btn); };
    }
    return card;
  }
  function renewLoan(id, btn) {
    btn.disabled = true; var prev = btn.textContent; btn.textContent = '...';
    apiJson('/student-auth/me/loans/' + encodeURIComponent(id) + '/renew', 'POST', {}).then(function (res) {
      if (!res.ok || !res.data || !res.data.data || !res.data.data.loan) {
        throw new Error(errMsg(res, 'Prolongation impossible.'));
      }
      var loan = res.data.data.loan;
      // met a jour le cache memoire
      if (cache.biblio) {
        cache.biblio = cache.biblio.map(function (l) { return l.id === loan.id ? loan : l; });
      }
      // remplace la carte
      var nodes = $('main').querySelectorAll('[data-loan]');
      for (var i = 0; i < nodes.length; i++) {
        if (nodes[i].getAttribute('data-loan') === String(loan.id)) {
          nodes[i].parentNode.replaceChild(loanCard(loan), nodes[i]);
          break;
        }
      }
      var until = loan.dueAt ? fmtDateLong(new Date(loan.dueAt)) : '';
      toast('Prolonge' + (until ? ' jusqu\'au ' + until : '') + '.', 'ok');
    }).catch(function (err) {
      btn.disabled = false; btn.textContent = prev;
      toast(err.message || 'Prolongation impossible.', 'err');
    });
  }

  // ====================================================================
  // ONGLET BONS PLANS (deals)
  // ====================================================================
  function loadDeals() {
    return api('/student-auth/me/deals').then(function (res) {
      if (!res.ok) throw new Error('fail');
      return (res.data && res.data.data && res.data.data.deals) || [];
    });
  }
  function renderDeals(slot, deals) {
    if (!deals.length) { slot.appendChild(emptyBlock('tag', 'Aucun bon plan', 'De nouvelles offres arriveront bientot.')); return; }
    deals.forEach(function (d) {
      var card = el('div', 'row-card deal');
      var head = '<div class="deal-head">';
      if (d.category) head += '<span class="chip brand">' + esc(d.category) + '</span>';
      if (d.partner) head += '<span class="deal-partner">' + esc(d.partner) + '</span>';
      head += '</div>';
      var foot = '<div class="deal-foot">';
      foot += '</div>';
      card.innerHTML = head +
        '<div class="deal-ttl">' + esc(d.title) + '</div>' +
        (d.description ? '<div class="deal-desc">' + esc(d.description) + '</div>' : '') +
        foot;

      var footEl = card.querySelector('.deal-foot');
      if (d.code) {
        var codeBtn = el('button', 'code-copy');
        codeBtn.type = 'button';
        codeBtn.innerHTML = svg('copy') + '<span>' + esc(d.code) + '</span>';
        codeBtn.setAttribute('aria-label', 'Copier le code ' + d.code);
        codeBtn.onclick = function () { copyCode(d.code); };
        footEl.appendChild(codeBtn);
      }
      if (d.expiresAt) {
        footEl.appendChild(el('span', 'deal-exp', "Jusqu'au " + fmtDateLong(new Date(d.expiresAt))));
      }
      if (d.url) {
        var a = document.createElement('a');
        a.className = 'link-go';
        a.href = d.url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.innerHTML = '<span>En profiter</span>' + svg('ext');
        footEl.appendChild(a);
      }
      slot.appendChild(card);
    });
  }
  function copyCode(code) {
    function ok() { toast('Code copie.', 'ok'); }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(ok, fallback);
    } else { fallback(); }
    function fallback() {
      try {
        var ta = document.createElement('textarea');
        ta.value = code; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        ok();
      } catch (e) { toast('Code : ' + code); }
    }
  }

  // ====================================================================
  // ONGLET PROFIL
  // ====================================================================
  function renderProfile(view) {
    var st = me.student || {}, est = me.establishment || {}, card = me.card || null;
    header(view, 'Profil', null);

    // ----- Ma photo (upload self-service, same-origin) -----
    var photoBlock = el('div', 'profile-block');
    var pb = el('div', 'photo-block');
    var thumb = el('div', 'photo-thumb');
    var hasPhoto = !!st.photoUrl;
    if (hasPhoto) {
      var pimg = el('img');
      pimg.alt = 'Votre photo de profil';
      pimg.onerror = function () {
        thumb.classList.add('fallback');
        thumb.textContent = initialsOf(st);
      };
      pimg.src = st.photoUrl;
      thumb.appendChild(pimg);
    } else {
      thumb.classList.add('fallback');
      thumb.setAttribute('aria-hidden', 'true');
      thumb.textContent = initialsOf(st);
    }

    var side = el('div', 'photo-side');
    side.appendChild(el('div', 'photo-label', 'Ma photo'));
    var pbtn = el('button', 'photo-btn', hasPhoto ? 'Changer ma photo' : 'Ajouter une photo');
    pbtn.type = 'button';
    pbtn.setAttribute('aria-label', hasPhoto ? 'Changer ma photo' : 'Ajouter une photo');

    var pinput = el('input');
    pinput.type = 'file';
    pinput.accept = 'image/png,image/jpeg,image/webp';
    pinput.className = 'hidden';
    pinput.style.display = 'none';
    pinput.setAttribute('aria-hidden', 'true');
    pinput.tabIndex = -1;

    pbtn.onclick = function () { pinput.click(); };
    pinput.onchange = function () {
      var file = pinput.files && pinput.files[0];
      if (file) uploadPhoto(file, pbtn);
      pinput.value = '';
    };

    side.appendChild(pbtn);
    side.appendChild(el('div', 'photo-hint', 'PNG, JPEG ou WebP, 3 Mo maximum.'));
    pb.appendChild(thumb);
    pb.appendChild(side);
    photoBlock.appendChild(pb);
    photoBlock.appendChild(pinput);
    view.appendChild(photoBlock);


    function row(k, v) {
      if (v == null || v === '') return '';
      return '<div class="profile-row"><span class="k">' + esc(k) + '</span><span class="v">' + esc(v) + '</span></div>';
    }
    var name = ((st.firstName || '') + ' ' + (st.lastName || '')).trim();
    var status = card ? (card.status === 'ACTIVE' ? 'Active' : (card.status === 'SUSPENDED' ? 'Suspendue' : card.status)) : '—';

    var block1 = el('div', 'profile-block');
    block1.innerHTML =
      row('Nom', name) +
      row('Numero', st.studentNumber) +
      row('E-mail', st.email) +
      row('Programme', st.program) +
      row('Annee', st.enrollmentYear);
    view.appendChild(block1);

    var block2 = el('div', 'profile-block');
    block2.innerHTML =
      row('Etablissement', est.name) +
      row('Type', sectorLabel(est.sector)) +
      row('Statut carte', status);
    view.appendChild(block2);

    // Consentement marketing (RGPD)
    var consentBlock = el('div', 'profile-block');
    var tr = el('div', 'toggle-row');
    var checked = !!me.marketingConsent;
    tr.innerHTML =
      '<div class="tl">Recevoir les bons plans et offres<small>Vous pouvez changer d\'avis a tout moment.</small></div>' +
      '<label class="switch"><input type="checkbox" id="consentToggle"' + (checked ? ' checked' : '') + ' aria-label="Recevoir les bons plans et offres"/><span class="track"></span></label>';
    consentBlock.appendChild(tr);
    view.appendChild(consentBlock);
    $('consentToggle').onchange = function () { updateConsent(this); };

    var logout = el('button', 'logout-btn', 'Se deconnecter');
    logout.type = 'button';
    logout.onclick = function () { clearToken(); location.href = '/carte'; };
    view.appendChild(logout);

    var note = el('p', 'privacy-note', 'Vos donnees restent privees et hebergees par votre etablissement.');
    view.appendChild(note);
  }
  function updateConsent(input) {
    var want = input.checked;
    input.disabled = true;
    apiJson('/student-auth/me/consent', 'PATCH', { marketingConsent: want }).then(function (res) {
      input.disabled = false;
      if (!res.ok || !res.data || !res.data.data) {
        input.checked = !want;
        toast('Echec de la mise a jour.', 'err');
        return;
      }
      me.marketingConsent = !!res.data.data.marketingConsent;
      input.checked = me.marketingConsent;
      toast('Preference enregistree.', 'ok');
    }).catch(function () {
      input.disabled = false; input.checked = !want;
      toast('Echec de la mise a jour.', 'err');
    });
  }

  // Upload de la photo etudiant (multipart/form-data, champ 'file').
  // Validation client (type + taille), puis rechargement de /me.
  function uploadPhoto(file, btn) {
    var MAX = 3 * 1024 * 1024; // 3 Mo
    var TYPES = ['image/png', 'image/jpeg', 'image/webp'];
    if (TYPES.indexOf(file.type) === -1) {
      toast('Format non supporte. Choisissez une image PNG, JPEG ou WebP.', 'err');
      return;
    }
    if (file.size > MAX) {
      toast('Image trop lourde (3 Mo maximum).', 'err');
      return;
    }
    var prev = btn.textContent;
    btn.disabled = true; btn.textContent = 'Envoi...';
    var fd = new FormData();
    fd.append('file', file);
    // NB : on ne fixe PAS Content-Type, le navigateur pose la boundary multipart.
    fetch(API + '/student-auth/me/photo', {
      method: 'POST',
      headers: jwt ? { 'Authorization': 'Bearer ' + jwt } : {},
      body: fd
    }).then(function (r) {
      return r.json().then(function (d) { return { ok: r.ok, status: r.status, data: d }; },
        function () { return { ok: r.ok, status: r.status, data: null }; });
    }).then(function (res) {
      if (!res.ok || !res.data || !res.data.data) {
        throw new Error(errMsg(res, "Echec de l'envoi de la photo."));
      }
      // Recharge /me pour rafraichir le Profil ET la carte.
      return enterApp().then(function () {
        selectTab('profil');
        toast('Photo mise a jour.', 'ok');
      });
    }).catch(function (err) {
      btn.disabled = false; btn.textContent = prev;
      toast(err.message || "Echec de l'envoi de la photo.", 'err');
    });
  }

  // ====================================================================
  // BOOT
  // ====================================================================
  function start() {
    if (jwt) {
      // tente de reprendre la session (token en sessionStorage)
      showScreen('app');
      enterApp().catch(function () { clearToken(); bootAuth(); });
    } else {
      bootAuth();
    }
  }
  start();

  // Service worker (defensif : ne bloque jamais l'app)
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      try {
        navigator.serviceWorker.register('/sw.js').catch(function () { /* ignore */ });
      } catch (e) { /* ignore */ }
    });
  }
})();
</script>
