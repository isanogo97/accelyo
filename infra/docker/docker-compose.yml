# =================================================================
# Accelyo - Docker Compose (production)
# =================================================================
# Deploiement depuis les images publiees sur GitHub Container Registry.
# - Tier applicatif (api, dashboard): reseau interne + externe (internet
#   sortant pour SMTP/Izly, et exposition sur l'hote).
# - Tier donnees (postgres, redis, minio): reseau INTERNE uniquement
#   (aucun acces internet, surface d'attaque minimale).
#
# Acces par defaut (sans domaine):
#   - Dashboard : http://<IP_SERVEUR>          (port 80)
#   - API       : http://<IP_SERVEUR>:3000     (mobile + lecteurs NFC)
#   Le dashboard proxifie /api vers l'API (meme origine, pas de CORS web).
#
# Quand un domaine + TLS seront prets: activer le service nginx
#   docker compose --profile tls up -d
# =================================================================

services:
  api:
    image: ${API_IMAGE:-ghcr.io/isanogo97/accelyo-api:latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE:-cloud}
      API_HOST: 0.0.0.0
      API_PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RSA_PRIVATE_KEY_PATH: /run/secrets/rsa_private.pem
      RSA_PUBLIC_KEY_PATH: /run/secrets/rsa_public.pem
      API_BASE_URL: ${API_BASE_URL}
      DASHBOARD_URL: ${DASHBOARD_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-accelyo-media}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-Accelyo <no-reply@accelyo.fr>}
      IZLY_MODE: ${IZLY_MODE:-deeplink}
    secrets:
      - rsa_private.pem
      - rsa_public.pem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Port 3000 NON expose sur l'hote: l'API n'est joignable que via le
    # reverse proxy nginx (https://accelyo.fr/api) et le reseau interne Docker.
    networks:
      - accelyo_internal
      - accelyo_external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    image: ${DASHBOARD_IMAGE:-ghcr.io/isanogo97/accelyo-dashboard:latest}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${DASHBOARD_PORT:-80}:80"
    networks:
      - accelyo_internal
      - accelyo_external

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-accelyo}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - accelyo_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - accelyo_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - accelyo_internal

  # Reverse proxy TLS - OPTIONNEL (profil "tls"), pour un domaine + certificats.
  nginx:
    image: nginx:alpine
    profiles: ["tls"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
      - dashboard
    networks:
      - accelyo_internal
      - accelyo_external

secrets:
  rsa_private.pem:
    file: ../../secrets/rsa_private.pem
  rsa_public.pem:
    file: ../../secrets/rsa_public.pem

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  accelyo_internal:
    driver: bridge
    internal: true
  accelyo_external:
    driver: bridge
