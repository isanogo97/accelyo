# =================================================================
# Accelyo - Docker Compose (production / on-premise)
# =================================================================
# Lance toute la stack:
#   - api          : backend Node.js
#   - dashboard    : front React (Vite build statique servi par nginx)
#   - postgres     : base de donnees
#   - redis        : cache + rate limit + nonces
#   - minio        : stockage objets (photos)
#   - nginx        : reverse proxy SSL termination
#
# ATTENTION:
#   - Le reseau accelyo_internal est ISOLE (pas d'internet sortant).
#   - Le reseau accelyo_external expose seulement le port 443.
#   - Les volumes sont persistants (./data) - inclure dans les backups.
# =================================================================

version: '3.9'

services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    image: accelyo/api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RSA_PRIVATE_KEY_PATH: /run/secrets/rsa_private.pem
      RSA_PUBLIC_KEY_PATH: /run/secrets/rsa_public.pem
      API_BASE_URL: ${API_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      DASHBOARD_URL: ${DASHBOARD_URL}
    secrets:
      - rsa_private.pem
      - rsa_public.pem
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - accelyo_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: ../..
      dockerfile: apps/dashboard/Dockerfile
    image: accelyo/dashboard:latest
    restart: unless-stopped
    networks:
      - accelyo_internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - accelyo_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - accelyo_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - accelyo_internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/ssl:/etc/nginx/ssl:ro
      - certbot_data:/var/www/certbot
    depends_on:
      - api
      - dashboard
    networks:
      - accelyo_internal
      - accelyo_external

secrets:
  rsa_private.pem:
    file: ../../secrets/rsa_private.pem
  rsa_public.pem:
    file: ../../secrets/rsa_public.pem

volumes:
  postgres_data:
  redis_data:
  minio_data:
  certbot_data:

networks:
  accelyo_internal:
    driver: bridge
    internal: true
  accelyo_external:
    driver: bridge
