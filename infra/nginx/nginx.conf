# =================================================================
# nginx (reverse proxy TLS) - production - domaine unique accelyo.fr
# =================================================================
# Termine le TLS (Let's Encrypt) pour accelyo.fr + www.accelyo.fr et route:
#   /            -> site vitrine (statique, apps/landing)
#   /app/        -> dashboard React (conteneur "dashboard", base /app/)
#   /api/        -> API (conteneur "api") - mobile, lecteurs NFC, dashboard
#
# Certificats: montes depuis /etc/letsencrypt (cf. docker-compose, profil tls).
# Renouvellement ACME: challenge HTTP-01 servi depuis /var/www/certbot.
# =================================================================

worker_processes auto;
events { worker_connections 4096; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    log_format json_combined escape=json '{ '
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"size":$body_bytes_sent,'
        '"ua":"$http_user_agent",'
        '"rt":$request_time'
    ' }';
    access_log /var/log/nginx/access.log json_combined;

    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # ----- HTTP : challenge ACME + redirection vers HTTPS -----
    server {
        listen 80;
        server_name accelyo.fr www.accelyo.fr;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTPS -----
    server {
        listen 443 ssl;
        http2 on;
        server_name accelyo.fr www.accelyo.fr;

        ssl_certificate     /etc/letsencrypt/live/accelyo.fr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/accelyo.fr/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # API (mobile, lecteurs NFC, appels du dashboard).
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 30s;
        }

        # Dashboard React sous /app/ (le prefixe est retire avant le conteneur).
        location = /app { return 301 /app/; }
        location /app/ {
            proxy_pass http://dashboard:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Site vitrine statique a la racine.
        location / {
            root /usr/share/landing;
            try_files $uri $uri/ /index.html;
        }
    }
}
