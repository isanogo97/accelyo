# =================================================================
# nginx (reverse proxy) - production
# =================================================================
# Termine SSL, applique les headers de securite, route:
#   - api.accelyo.fr  -> conteneur "api"
#   - app.accelyo.fr  -> conteneur "dashboard"
#
# ATTENTION:
#   - Les certificats sont a placer dans /etc/nginx/ssl (Let's Encrypt).
#   - HSTS preload est active: une fois enable, on ne peut PAS revenir
#     en arriere sans intervention manuelle sur la liste preload.
# =================================================================

worker_processes auto;
events { worker_connections 4096; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server_tokens off;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    log_format json_combined escape=json '{ '
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"size":$body_bytes_sent,'
        '"ua":"$http_user_agent",'
        '"rt":$request_time'
    ' }';
    access_log /var/log/nginx/access.log json_combined;

    # Rate limit global (en plus du rate limit applicatif).
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    # Redirection HTTP -> HTTPS pour tous les domaines.
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # ----- API -----
    server {
        listen 443 ssl http2;
        server_name api.accelyo.fr;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        limit_req zone=api burst=20 nodelay;

        location / {
            proxy_pass http://api:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ----- Dashboard -----
    server {
        listen 443 ssl http2;
        server_name app.accelyo.fr;

        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location / {
            proxy_pass http://dashboard:80;
            proxy_set_header Host $host;
        }
    }
}
